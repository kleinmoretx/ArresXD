name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *" # jalan tiap hari jam 00:00 UTC
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation (purple theme, dark bg)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: kleinmoretx
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23a78bfa&color_dots=%231e1b4b,%234c1d95,%237c3aed,%23a78bfa,%23c4b5fd

      - name: Push output to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
